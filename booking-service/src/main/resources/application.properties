server.port=8085
spring.application.name=booking-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:mysql://localhost:3306/parkease_booking?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Asquare#27
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=parkease-ultra-secure-jwt-key-2025-minakshi-256bits-secret
app.services.spot-service=http://PARKINGSPOT-SERVICE
app.services.parkinglot-service=http://PARKINGLOT-SERVICE
app.booking.checkin-grace-minutes=15

logging.level.com.parkease=DEBUG
